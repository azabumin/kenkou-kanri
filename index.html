// ── BP Evaluation (Japanese) ──
function evalBP(sys,dia,pulse){
  let status="正常",color="#22c55e",advice=[];
  if(sys>=180||dia>=120){status="高血圧クライシス";color="#dc2626";advice.push("すぐに医師へ連絡してください");}
  else if(sys>=160||dia>=100){status="高血圧2度";color="#ef4444";advice.push("医師への相談を推奨します","塩分摂取を減らしてください");}
  else if(sys>=140||dia>=90){status="高血圧1度";color="#f97316";advice.push("減塩食を継続してください","ストレス管理が重要です");}
  else if(sys>=130||dia>=80){status="注意血圧";color="#eab308";advice.push("生活習慣の改善を推奨します");}
  else if(sys>=120&&dia<80){status="やや高め";color="#84cc16";advice.push("現状を維持しましょう");}
  else if(sys<90||dia<60){status="低血圧";color="#6366f1";advice.push("起立性低血圧に注意","水分摂取を増やしてください");}
  else{advice.push("素晴らしい数値です！");}
  if(pulse>100)advice.push("脈拍が速い — 安静後に再測定");
  else if(pulse&&pulse<50)advice.push("脈拍が遅い — 医師に確認を");
  return{status,color,advice};
}

// ── CSV parser ──
function parseCSV(text){
  return text.trim().split("\n").reduce((acc,line)=>{
    const cols=line.split(",").map(c=>c.trim().replace(/"/g,""));
    if(cols.length>=3){
      const nums=cols.slice(1).map(Number).filter(n=>!isNaN(n));
      if(nums.length>=2)acc.push({date:cols[0],sys:nums[0],dia:nums[1],pulse:nums[2]||null});
    }
    return acc;
  },[]);
}

// ── Meal scorer (Japanese keywords) ──
function scoreMeal(meal){
  if(!meal)return null;
  const m=meal;
  let score=50,tags=[];
  const good=[
    ["野菜","サラダ","ほうれん草","ブロッコリー","にんじん","きのこ","大根","キャベツ"],
    ["豆腐","魚","鮭","サバ","さんま","鶏むね肉","卵","納豆"],
    ["雑穀","玄米","オートミール","押麦","もち麦"]
  ];
  const bad=[
    ["ラーメン","うどん","そば","パスタ"],
    ["揚げ物","天ぷら","唐揚げ","とんかつ","フライ"],
    ["ケーキ","お菓子","チョコ","アイス","菓子パン"],
    ["ビール","日本酒","ワイン","焼酎","お酒"]
  ];
  good.forEach(g=>g.forEach(w=>{if(m.includes(w)){score+=8;tags.push({t:"✅ "+w,c:"#22c55e"});}}));
  bad.forEach(b=>b.forEach(w=>{if(m.includes(w)){score-=10;tags.push({t:"⚠️ "+w,c:"#f97316"});}}));
  if(m.includes("減塩")||m.includes("塩分控え")){score+=5;tags.push({t:"✅ 減塩",c:"#22c55e"});}
  if(m.includes("食べすぎ")||m.includes("大盛り")){score-=8;tags.push({t:"⚠️ 食べすぎ",c:"#ef4444"});}
  score=Math.max(0,Math.min(100,score));
  const grade=score>=80?{label:"優秀",color:"#22c55e"}:score>=60?{label:"良好",color:"#84cc16"}:score>=40?{label:"普通",color:"#eab308"}:{label:"要改善",color:"#ef4444"};
  return{score,grade,tags};
}

// ── SVG Line Chart ──
function SvgChart({data}){
  if(!data||data.length===0)return h("div",{style:{color:"#475569",fontSize:12,textAlign:"center",padding:20}},"データがありません");
  // Dynamic width: each data point gets at least 28px, minimum 360
  const PL=38,PR=10,PT=14,PB=32;
  const pointW=Math.max(28, Math.floor((360-PL-PR)/(data.length||1)));
  const W=Math.max(360, PL+PR+pointW*data.length);
  const H=175;
  const cw=W-PL-PR, ch=H-PT-PB;
  const vals=[...data.map(d=>d["収縮期"]).filter(Boolean),...data.map(d=>d["拡張期"]).filter(Boolean),...data.map(d=>d["脈拍"]).filter(Boolean)];
  const minV=Math.max(0,Math.min(50,...vals)-10);
  const maxV=Math.min(250,Math.max(170,...vals)+10);
  const range=maxV-minV||1;
  const x=i=>PL+i*pointW+pointW/2;
  const y=v=>PT+ch-(((v-minV)/range)*ch);
  const buildPath=(key)=>{
    let d2="",first=true;
    data.forEach((dp,i)=>{
      if(dp[key]==null)return;
      const px=x(i).toFixed(1),py=y(dp[key]).toFixed(1);
      d2+=first?`M${px} ${py}`:`L${px} ${py}`;
      first=false;
    });
    return d2;
  };
  const [tooltip,setTooltip]=useState(null);
  const gridYs=[60,80,90,100,120,140,160,180];
  const showLabel=(i)=>{
    if(data.length<=10) return true;
    if(data.length<=20) return i%2===0;
    return i%Math.ceil(data.length/10)===0||i===data.length-1;
  };
  return h("div",{style:{position:"relative",overflowX:"auto",overflowY:"visible",WebkitOverflowScrolling:"touch"}},
    h("svg",{viewBox:`0 0 ${W} ${H}`,width:Math.max(W,360),height:H,
      style:{display:"block",minWidth:W},
      onMouseLeave:()=>setTooltip(null),
      onTouchEnd:()=>setTimeout(()=>setTooltip(null),2500)},
      // background
      h("rect",{x:PL,y:PT,width:cw,height:ch,fill:"rgba(255,255,255,.02)",rx:4}),
      // horizontal grid lines with labels
      gridYs.filter(v=>v>minV&&v<maxV).map(v=>
        h(Fragment,{key:v},
          h("line",{x1:PL,y1:y(v),x2:W-PR,y2:y(v),
            stroke:v===140?"rgba(239,68,68,.35)":v===90?"rgba(59,130,246,.35)":"rgba(255,255,255,.06)",
            strokeDasharray:v===140||v===90?"6 3":"3 3",strokeWidth:v===140||v===90?1.5:1}),
          h("text",{x:PL-3,y:y(v)+3.5,textAnchor:"end",fontSize:9,fill:v===140?"#ef444499":v===90?"#3b82f699":"#475569"},v)
        )
      ),
      // reference line labels
      h("text",{x:W-PR-2,y:y(140)-3,textAnchor:"end",fontSize:8,fill:"rgba(239,68,68,.6)"},"140"),
      h("text",{x:W-PR-2,y:y(90)-3,textAnchor:"end",fontSize:8,fill:"rgba(59,130,246,.6)"},"90"),
      // vertical guides per data point
      data.map((_,i)=>
        h("line",{key:"vg"+i,x1:x(i),y1:PT,x2:x(i),y2:PT+ch,
          stroke:"rgba(255,255,255,.03)",strokeWidth:1})
      ),
      // x-axis date labels
      data.map((d,i)=>showLabel(i)?
        h(Fragment,{key:"xl"+i},
          h("line",{x1:x(i),y1:PT+ch,x2:x(i),y2:PT+ch+4,stroke:"rgba(255,255,255,.15)",strokeWidth:1}),
          h("text",{x:x(i),y:H-2,textAnchor:"middle",fontSize:8.5,fill:"#64748b",fontWeight:"500"},
            d.date.slice(5).replace("-","/"))
        ):null
      ),
      // area fills (subtle)
      buildPath("収縮期").length>1&&h("path",{d:buildPath("収縮期")+`L${x(data.length-1)} ${PT+ch} L${x(0)} ${PT+ch} Z`,
        fill:"rgba(239,68,68,.06)"}),
      buildPath("拡張期").length>1&&h("path",{d:buildPath("拡張期")+`L${x(data.length-1)} ${PT+ch} L${x(0)} ${PT+ch} Z`,
        fill:"rgba(59,130,246,.06)"}),
      // lines
      buildPath("収縮期").length>1&&h("path",{d:buildPath("収縮期"),stroke:"#ef4444",strokeWidth:"2",fill:"none",strokeLinejoin:"round"}),
      buildPath("拡張期").length>1&&h("path",{d:buildPath("拡張期"),stroke:"#3b82f6",strokeWidth:"2",fill:"none",strokeLinejoin:"round"}),
      buildPath("脈拍").length>1&&h("path",{d:buildPath("脈拍"),stroke:"#a855f7",strokeWidth:"1.5",fill:"none",strokeDasharray:"5 3",strokeLinejoin:"round"}),
      // data point dots
      data.map((d,i)=>h(Fragment,{key:"dots"+i},
        d["収縮期"]&&h("circle",{cx:x(i),cy:y(d["収縮期"]),r:3,fill:"#ef4444",stroke:"rgba(8,13,26,.8)",strokeWidth:1.5}),
        d["拡張期"]&&h("circle",{cx:x(i),cy:y(d["拡張期"]),r:3,fill:"#3b82f6",stroke:"rgba(8,13,26,.8)",strokeWidth:1.5}),
        d["脈拍"]&&h("circle",{cx:x(i),cy:y(d["脈拍"]),r:2.5,fill:"#a855f7",stroke:"rgba(8,13,26,.8)",strokeWidth:1})
      )),
      // invisible touch targets
      data.map((d,i)=>
        h("rect",{key:"hit"+i,x:x(i)-pointW/2,y:PT,width:pointW,height:ch,fill:"transparent",
          style:{cursor:"pointer"},
          onMouseEnter:()=>setTooltip({i,d,px:x(i)}),
          onTouchStart:(e)=>{e.preventDefault();setTooltip({i,d,px:x(i)});}
        })
      )
    ),
    // Tooltip
    tooltip&&h("div",{style:{
      position:"absolute",top:0,
      left:Math.min(Math.max(tooltip.px-50,0), 220),
      background:"rgba(10,15,30,.97)",border:"1px solid rgba(99,102,241,.4)",
      borderRadius:9,padding:"9px 13px",fontSize:12,color:"#e2e8f0",
      pointerEvents:"none",zIndex:20,minWidth:110,boxShadow:"0 4px 20px rgba(0,0,0,.5)"}},
      h("div",{style:{fontWeight:700,color:"#818cf8",marginBottom:5,fontSize:11}},
        tooltip.d.date.replace(/-/g,"/")),
      tooltip.d["収縮期"]&&h("div",{style:{color:"#ef4444",marginBottom:2}},
        "収縮期: ",h("b",null,tooltip.d["収縮期"])," mmHg"),
      tooltip.d["拡張期"]&&h("div",{style:{color:"#3b82f6",marginBottom:2}},
        "拡張期: ",h("b",null,tooltip.d["拡張期"])," mmHg"),
      tooltip.d["脈拍"]&&h("div",{style:{color:"#a855f7"}},
        "脈拍: ",h("b",null,tooltip.d["脈拍"])," bpm")
    )
  );
}

// ── DatePicker Component ──
function localToday(){
  const n=new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}
function addDays(dateStr,n){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt=new Date(y,m-1,d+n);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}
function DatePicker({value, onChange, label}){
  const [open,setOpen]=useState(false);
  const today=localToday();
  const [y,m]=value?value.split("-").map(Number):[new Date().getFullYear(),new Date().getMonth()+1];
  const [viewY,setViewY]=useState(y);
  const [viewM,setViewM]=useState(m);

  const fmt=d=>{
    if(!d)return "日付を選択";
    const [yy,mm,dd]=d.split("-").map(Number);
    const wdays=["日","月","火","水","木","金","土"];
    const w=wdays[new Date(yy,mm-1,dd).getDay()];
    return yy+"年"+mm+"月"+dd+"日（"+w+"）";
  };
  const isToday=value===today;

  const prevMonth=()=>{
    if(viewM===1){setViewY(viewY-1);setViewM(12);}
    else setViewM(viewM-1);
  };
  const nextMonth=()=>{
    const ny=viewM===12?viewY+1:viewY;
    const nm=viewM===12?1:viewM+1;
    const firstOfNext=ny+"-"+String(nm).padStart(2,"0")+"-01";
    if(firstOfNext<=today){setViewY(ny);setViewM(nm);}
  };

  const firstDow=new Date(viewY,viewM-1,1).getDay();
  const daysInMonth=new Date(viewY,viewM,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const selectDay=d=>{
    const ds=viewY+"-"+String(viewM).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    if(ds<=today){onChange(ds);setOpen(false);}
  };

  const btnS={background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",
    borderRadius:8,color:"#e2e8f0",width:38,height:44,fontSize:20,cursor:"pointer",
    flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"};

  return h("div",{style:{display:"flex",flexDirection:"column",gap:8,position:"relative"}},
    label&&h("div",{style:{fontSize:11,color:"#94a3b8",fontWeight:700,letterSpacing:".06em"}},"📅 ",label),
    h("div",{style:{display:"flex",alignItems:"center",gap:6}},
      h("button",{onClick:e=>{e.preventDefault();if(value)onChange(addDays(value,-1));},style:btnS},"‹"),
      h("div",{
        onClick:()=>{setViewY(y);setViewM(m);setOpen(!open);},
        style:{flex:1,height:44,background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.4)",
          borderRadius:9,display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"0 14px",cursor:"pointer",userSelect:"none"}},
        h("span",{style:{fontSize:14,fontWeight:700,color:"#c7d2fe"}},fmt(value)),
        h("span",{style:{fontSize:15}},"📅")
      ),
      h("button",{onClick:e=>{e.preventDefault();if(value&&value<today)onChange(addDays(value,1));},
        style:{...btnS,opacity:isToday?.3:1,cursor:isToday?"default":"pointer"},disabled:isToday},"›"),
      h("button",{onClick:e=>{e.preventDefault();onChange(today);setOpen(false);},
        style:{...btnS,width:"auto",padding:"0 10px",fontSize:12,fontWeight:700,
          background:isToday?"rgba(99,102,241,.3)":"rgba(255,255,255,.06)",
          border:"1px solid "+(isToday?"rgba(99,102,241,.7)":"rgba(255,255,255,.1)"),
          color:isToday?"#818cf8":"#94a3b8"}},"今日")
    ),
    open&&h("div",{style:{
      position:"absolute",top:"calc(100% + 6px)",left:0,
      width:220,zIndex:200,
      background:"#1a2236",border:"1px solid rgba(99,102,241,.45)",
      borderRadius:10,padding:"8px 8px 6px",
      boxShadow:"0 8px 32px rgba(0,0,0,.7)"}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}},
        h("button",{onClick:prevMonth,
          style:{background:"none",border:"none",color:"#818cf8",fontSize:14,cursor:"pointer",padding:"2px 6px"}
        },"‹"),
        h("span",{style:{fontSize:11,fontWeight:700,color:"#c7d2fe"}},viewY+"年"+viewM+"月"),
        h("button",{onClick:nextMonth,
          style:{background:"none",border:"none",color:"#818cf8",fontSize:14,cursor:"pointer",padding:"2px 6px",
            opacity:(viewY+"-"+String(viewM).padStart(2,"0"))>=(today.slice(0,7))?.25:1}
        },"›")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:3}},
        ["日","月","火","水","木","金","土"].map(w=>
          h("div",{key:w,style:{textAlign:"center",fontSize:8,
            color:w==="日"?"#f87171":w==="土"?"#60a5fa":"#475569",
            padding:"1px 0",fontWeight:600}},w)
        )
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}},
        cells.map((d,i)=>{
          if(!d) return h("div",{key:"e"+i});
          const ds=viewY+"-"+String(viewM).padStart(2,"0")+"-"+String(d).padStart(2,"0");
          const isSel=ds===value;
          const isTod=ds===today;
          const isFut=ds>today;
          const dow=new Date(viewY,viewM-1,d).getDay();
          return h("div",{key:d,
            onClick:()=>!isFut&&selectDay(d),
            style:{textAlign:"center",padding:"3px 0",borderRadius:4,fontSize:10,
              fontWeight:isSel||isTod?700:400,
              background:isSel?"#6366f1":isTod?"rgba(99,102,241,.25)":"transparent",
              color:isFut?"#2d3a50":isSel?"#fff":isTod?"#818cf8":dow===0?"#f87171":dow===6?"#60a5fa":"#cbd5e1",
              cursor:isFut?"default":"pointer",
              border:isTod&&!isSel?"1px solid rgba(99,102,241,.5)":"1px solid transparent",
              lineHeight:"1.6"}},
            d
          );
        })
      ),
      h("button",{onClick:()=>setOpen(false),
        style:{marginTop:5,width:"100%",background:"rgba(255,255,255,.04)",
          border:"1px solid rgba(255,255,255,.08)",borderRadius:6,
          color:"#64748b",padding:"4px",fontSize:10,cursor:"pointer"}},"閉じる")
    )
  );
}

  const [editMedId,setEditMedId]=useState(null);
  const [dailyLogs,setDailyLogs]=useState({});
  const [logDate,setLogDate]=useState("");
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [routineLog,setRoutineLog]=useState({});
  const toggleRoutine=i=>setRoutineLog(r=>({...r,[i]:{...r[i],done:!r[i]?.done}}));
  const setRoutineDetail=(i,key,val)=>setRoutineLog(r=>({...r,[i]:{...r[i],[key]:val}}));

              h("div",{style:{fontSize:11,color:"#64748b",marginBottom:4}},r.date),
              h("div",{style:{fontSize:18,fontWeight:800}},
                h("span",{style:{color:"#ef4444"}},r.sys),
                h("span",{style:{color:"#475569",fontSize:13}},"/"),
                h("span",{style:{color:"#3b82f6"}},r.dia),
                r.pulse&&h("span",{style:{color:"#a855f7",fontSize:13,marginLeft:8}},"♥",r.pulse)
              ),
              h("span",{style:{...S.badge(e.color),fontSize:11,padding:"2px 8px",marginTop:5,display:"inline-block"}},e.status),
              dl.breakfast&&h("div",{style:{fontSize:11,color:"#64748b",marginTop:4}},"🍱 ",dl.breakfast),
              r.note&&h("div",{style:{fontSize:11,color:"#475569",marginTop:2}},r.note)
            ),
            h("button",{onClick:()=>delBP(r.id),style:{background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:18,padding:4}},"×")
          )
        );
      })
    ),

    // ══ PROFILE ══
    tab==="profile"&&h("div",{style:S.sec},
      h("div",{style:S.card},
        h("div",{style:S.ct},"👤 基本情報"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:9}},
          h("input",{style:S.inp,placeholder:"お名前",value:profile.name,onChange:e=>setProfile(p=>({...p,name:e.target.value}))}),
          h("div",{style:S.row},
            h("input",{type:"number",style:S.inp,placeholder:"年齢",value:profile.age,onChange:e=>setProfile(p=>({...p,age:e.target.value}))}),
            h("select",{style:{...S.sel,flex:"0 0 100px"},value:profile.gender,onChange:e=>setProfile(p=>({...p,gender:e.target.value}))},
              ["男性","女性"].map(g=>h("option",{key:g,value:g},g))
            )
          ),
          h("div",{style:S.row},
            h("input",{type:"number",style:S.inp,placeholder:"身長 (cm)",value:profile.height,onChange:e=>setProfile(p=>({...p,height:e.target.value}))}),
            h("input",{type:"number",style:S.inp,placeholder:"体重 (kg)",value:profile.weight,onChange:e=>setProfile(p=>({...p,weight:e.target.value}))})
          ),
          h("select",{style:S.sel,value:profile.bloodType,onChange:e=>setProfile(p=>({...p,bloodType:e.target.value}))},
            h("option",{value:""},"血液型を選択"),
            ["A型","B型","O型","AB型","A+","A-","B+","B-","O+","O-","AB+","AB-"].map(t=>h("option",{key:t,value:t},t))
          )
        )
      ),
      (profile.height&&profile.weight)&&(()=>{
        const h2=Number(profile.height),w=Number(profile.weight);
        const bmi=(w/((h2/100)**2)).toFixed(1);
        const ideal=((h2-100)*0.9).toFixed(1);
        const diff=(w-Number(ideal)).toFixed(1);
        const bc=bmi<18.5?"#6366f1":bmi<23?"#22c55e":bmi<25?"#84cc16":bmi<30?"#f97316":"#ef4444";
        const bl=bmi<18.5?"低体重":bmi<23?"正常範囲":bmi<25?"過体重":bmi<30?"肥満1度":"肥満2度";
        const ba=bmi<18.5?"体重増加が必要です。タンパク質摂取を増やしましょう。":bmi<23?"理想的な体重です。現状を維持しましょう。":bmi<25?"やや過体重です。食事管理と運動を推奨します。":"肥満状態です。糖尿病・高血圧悪化のリスクがあります。医師と相談してください。";
        return h("div",{style:{...S.card,borderColor:`${bc}30`}},
          h("div",{style:S.ct},"📊 身体指数（自動計算）"),
          h("div",{style:S.row},
            h("div",{style:S.stat(bc)},h("div",{style:{...S.sv,color:bc}},bmi),h("div",{style:S.sl},"BMI")),
            h("div",{style:S.stat("#38bdf8")},h("div",{style:{...S.sv,color:"#38bdf8",fontSize:20}},ideal+"kg"),h("div",{style:S.sl},"標準体重")),
            h("div",{style:S.stat(diff>0?"#f97316":"#22c55e")},
              h("div",{style:{...S.sv,color:diff>0?"#f97316":"#22c55e",fontSize:20}},(diff>0?"+":"")+diff+"kg"),
              h("div",{style:S.sl},"標準との差")
            )
          ),
          h("div",{style:{marginTop:10}},
            h("span",{style:S.badge(bc)},bl),
            h("div",{style:{fontSize:12,color:"#94a3b8",marginTop:8}},"💡 ",ba)
          )
        );
      })(),
      h("div",{style:S.card},
        h("div",{style:S.ct},"🏥 健康情報"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:9}},
          h("input",{style:S.inp,placeholder:"既往症（例：糖尿病、高血圧、高脂血症）",value:profile.conditions,onChange:e=>setProfile(p=>({...p,conditions:e.target.value}))}),
          h("input",{style:S.inp,placeholder:"アレルギー・禁忌事項（例：アスピリン、海産物）",value:profile.allergies,onChange:e=>setProfile(p=>({...p,allergies:e.target.value}))})
        )
      ),
      h("div",{style:S.card},
        h("div",{style:S.ct},"🩺 担当医・緊急連絡先"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:9}},
          h("input",{style:S.inp,placeholder:"担当医の氏名",value:profile.doctorName,onChange:e=>setProfile(p=>({...p,doctorName:e.target.value}))}),
          h("input",{style:S.inp,placeholder:"担当医の連絡先",value:profile.doctorPhone,onChange:e=>setProfile(p=>({...p,doctorPhone:e.target.value}))}),
          h("input",{style:S.inp,placeholder:"緊急連絡先（ご家族）",value:profile.emergency,onChange:e=>setProfile(p=>({...p,emergency:e.target.value}))})
        )
      ),
      h("div",{style:S.card},
        h("div",{style:S.ct},"📝 健康メモ"),
        h("textarea",{style:{...S.inp,minHeight:80,resize:"vertical"},
          placeholder:"特記事項・既往歴・手術歴など...",
          value:profile.memo,onChange:e=>setProfile(p=>({...p,memo:e.target.value}))})
      ),
      h("button",{style:S.btn(),onClick:()=>saveProf(profile)},profSaved?"✅ 保存しました！":"💾 プロフィールを保存"),
      h("div",{style:{height:10}})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
